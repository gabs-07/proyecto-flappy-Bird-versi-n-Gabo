<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 320" width="80" height="320">
  <defs>
    <linearGradient id="pb" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#3A8E1C"/>
      <stop offset="25%"  stop-color="#52C22A"/>
      <stop offset="50%"  stop-color="#79E84A"/>
      <stop offset="75%"  stop-color="#52C22A"/>
      <stop offset="100%" stop-color="#2E7010"/>
    </linearGradient>
    <linearGradient id="pc" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#2D7015"/>
      <stop offset="25%"  stop-color="#4AAB26"/>
      <stop offset="50%"  stop-color="#6EDB3C"/>
      <stop offset="75%"  stop-color="#4AAB26"/>
      <stop offset="100%" stop-color="#1E5A0A"/>
    </linearGradient>
  </defs>
  <!-- Cap superior (boca del tubo) -->
  <rect x="2" y="0" width="76" height="24" rx="4" fill="url(#pc)" stroke="#1E5A0A" stroke-width="1.5"/>
  <rect x="8" y="4" width="12" height="16" fill="white" opacity="0.10" rx="2"/>
  <!-- Cuerpo del tubo -->
  <rect x="10" y="24" width="60" height="296" fill="url(#pb)" stroke="#2E7010" stroke-width="1.5"/>
  <!-- Reflejo -->
  <rect x="16" y="24" width="10" height="296" fill="white" opacity="0.12"/>
</svg>
